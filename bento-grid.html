<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000000;
      overflow: hidden;
    }

    .bento-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      width: 100vw;
      height: 100vh;
      gap: 10px;
      padding: 10px;
    }

    .bento-item {
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 12px;
      background-color: #1a1a1a;
    }

    .bento-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>

  <body>
    <div class="bento-grid">
      <div class="bento-item">
        <img src="./images/t pan before.jpg" alt="Transmission Pan Before" />
      </div>
      <div class="bento-item">
        <img src="./images/t pan after.jpg" alt="Transmission Pan After" />
      </div>
      <div class="bento-item">
        <img src="./images/wipermotor.jpg" alt="Wiper Motor" />
      </div>
      <div class="bento-item">
        <img src="./images/switch.jpg" alt="Window Switch" />
      </div>
    </div>
  </body>
</html>
