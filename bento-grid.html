<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    body {
      background-color: #121212;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .bento-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      max-width: 1000px;
    }

    .bento-item {
      background-color: #333;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 1 / 1;
    }

    .bento-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>

  <body>
    <div class="bento-grid">
      <div class="bento-item">
        <img src="t pan before.jpg" alt="Transmission Pan Before" />
      </div>
      <div class="bento-item">
        <img src="t pan after.jpg" alt="Transmission Pan After" />
      </div>
      <div class="bento-item">
        <img src="wipermotor.jpg" alt="Wiper Motor" />
      </div>
      <div class="bento-item"><img src="switch.jpg" alt="Window Switch" /></div>
    </div>
  </body>
</html>
